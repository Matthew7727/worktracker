name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and Release (macOS, signed + notarized)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID Application cert (.p12, base64) — used only on the mac runner
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization credentials picked up by electron-builder (notarize: true)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx vite build && npx electron-builder --publish always

      - name: Build and Release (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --publish always

  # electron-builder uploads assets to a DRAFT release, and electron-updater
  # can only see published releases. Publish once BOTH platform jobs succeed
  # so updaters never observe a half-uploaded release.
  publish:
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
            --jq '[.[] | select(.tag_name == "${{ github.ref_name }}")][0].id')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "No release found for tag ${{ github.ref_name }}"
            exit 1
          fi
          gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -F draft=false -f make_latest=true
          echo "Published release ${{ github.ref_name }} (id $RELEASE_ID)"
